.telegram-button{background:rgba(0,136,204,.7);}
.exit-button{background:rgba(255,45,45,.7);}

@keyframes wave{
0%{transform:translateY(0) translateX(-8px)}
50%{transform:translateY(-5px) translateX(-8px)}
100%{transform:translateY(0) translateX(-8px)}
}

@keyframes iconPop{
0%{transform:scale(1) rotate(0deg);}
30%{transform:scale(1.2) rotate(-10deg);}
60%{transform:scale(1.2) rotate(10deg);}
100%{transform:scale(1) rotate(0deg);}
}

/* CHAT */

left:10px;
bottom:300px;

.chat-bubble{

gap:6px;
background:rgba(255,255,255,.25);

padding:6px 8px;
border-radius:12px;
margin:4px;
font-size:11px;
backdrop-filter:blur(4px);
animation:fadeIn .3s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.chat-avatar{
width:22px;
height:22px;
border-radius:50%;
}

/* EMOJI */
.float-container{
position:fixed;
right:10px;
bottom:100px;
pointer-events:none;
}

.float-item{
position:absolute;
animation:floatUp 3s linear forwards;
}

@keyframes floatUp{

10%{opacity:1;}
